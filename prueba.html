<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Prueba GSAP</title>
  <style>
    body {
      margin: 0;
      background: #000;
      overflow: hidden;
      height: 100vh;
      position: relative;
    }

    .pelota {
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff, #d5d5d5 50%, #557cff 100%);
      top: 50%;
      left: -220px;
      transform: translateY(-50%);
      box-shadow: 0 0 40px rgba(70,130,255,.35);
    }
  </style>
</head>
<body>

  <div class="pelota"></div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script>
    gsap.to(".pelota", {
      x: window.innerWidth + 400,
      rotation: 360,
      duration: 8,
      ease: "none",
      repeat: -1
    });
  </script>

</body>
</html>
